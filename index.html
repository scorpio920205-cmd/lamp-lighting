<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>招生點燈｜普慶禪修班</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;700&family=Noto+Sans+TC:wght@400;500;700&family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
<style>
  :root{
    --gold:#e3b25e;
    --gold-soft:#f2d9a8;
    --ember:#c0392b;
    --ember-deep:#8e271b;
    --ink:#2c2014;
  }
  [data-theme="night"]{
    --sky-top:#0a1426;
    --sky-mid:#163a63;
    --sky-bottom:#050a14;
    --text-primary:#f4ead9;
    --text-secondary:#9fb0c6;
    --ground:#040810;
    --celestial-fill:#f4ead9;
    --celestial-glow:rgba(244,234,217,0.55);
  }
  .stage[data-theme="night"]{
    background-image:url('assets/night-bg.png');
    background-size:cover;
    background-position:center bottom;
  }
  [data-theme="night"] .celestial{
    display: block;
    top:14.5%; left:86.5%; width:54px; height:54px;
    background: radial-gradient(circle at 30% 30%, #ffffff 0%, #fffdf0 35%, #fdf5d0 70%, #ebd485 100%);
    box-shadow: 
      0 0 20px 5px rgba(255, 253, 240, 0.6), 
      0 0 45px 15px rgba(253, 245, 208, 0.4),
      0 0 90px 30px rgba(235, 212, 133, 0.2);
    border-radius: 50%;
    opacity: 0.95;
    z-index: 2;
  }
  [data-theme="night"] .stars{ display:none; }
  [data-theme="day"]{
    --sky-top:#4f97c9;
    --sky-mid:#8fc3dd;
    --sky-bottom:#d9ecea;
    --text-primary:#1c2b3a;
    --text-secondary:#3d5468;
    --ground:#26333a;
    --celestial-fill:#fff3d6;
    --celestial-glow:rgba(255,219,140,0.7);
  }
  .stage[data-theme="day"]{
    background-image:url('assets/day-bg.jpg');
    background-size:cover;
    background-position:center bottom;
  }
  [data-theme="day"] .celestial{ display:none; }
  [data-theme="day"] .clouds{ display:none; }

  *{box-sizing:border-box}
  html,body{margin:0;height:100%;font-family:'Noto Sans TC',sans-serif}
  body{overflow:hidden;background:#000}

  .stage{
    position:relative;
    width:100vw;height:100vh;
    background:linear-gradient(180deg, var(--sky-top) 0%, var(--sky-mid) 55%, var(--sky-bottom) 100%);
    overflow:hidden;
    transition:background 1.2s ease;
  }

  .celestial{
    display:none;
    position:absolute; top:7%; left:50%;
    width:90px; height:90px; border-radius:50%;
    background:var(--celestial-fill);
    box-shadow:0 0 70px 30px var(--celestial-glow);
    transition:background 1.2s ease, box-shadow 1.2s ease;
  }
  [data-theme="night"] .celestial::after{
    content: "";
    position: absolute; inset: 0;
    border-radius: 50%;
    background: 
      radial-gradient(circle at 70% 60%, rgba(0,0,0,0.06) 0%, rgba(0,0,0,0) 25%),
      radial-gradient(circle at 40% 70%, rgba(0,0,0,0.08) 0%, rgba(0,0,0,0) 30%),
      radial-gradient(circle at 30% 40%, rgba(0,0,0,0.05) 0%, rgba(0,0,0,0) 20%),
      radial-gradient(circle at 75% 30%, rgba(0,0,0,0.07) 0%, rgba(0,0,0,0) 25%);
    opacity: 0.8;
  }

  .stars{position:absolute; inset:0; opacity:0; transition:opacity 1.2s ease}
  [data-theme="night"] .stars{opacity:1}
  .star{position:absolute; background:#fff; border-radius:50%; animation:twinkle 3.5s ease-in-out infinite}
  @keyframes twinkle{0%,100%{opacity:.25}50%{opacity:1}}

  .clouds{position:absolute; inset:0; opacity:0; transition:opacity 1.2s ease; pointer-events:none}
  [data-theme="day"] .clouds{opacity:1}
  .cloud{position:absolute; background:#ffffff; border-radius:50px; opacity:.85; filter:blur(1px)}
  .cloud::before, .cloud::after{content:""; position:absolute; background:#fff; border-radius:50%}

  .ground-fade{
    position:absolute; left:0; right:0; bottom:0; height:22%;
    background:linear-gradient(180deg, rgba(0,0,0,0) 0%, rgba(0,0,0,0.35) 100%);
    z-index:3; pointer-events:none;
  }
  [data-theme="day"] .ground-fade{
    height:34%;
    background:linear-gradient(180deg, rgba(0,0,0,0) 0%, var(--ground) 92%);
  }

  header.hud{
    position:absolute; top:0; left:0; right:0; z-index:6;
    padding:2.4rem 2rem 0; text-align:center;
  }
  .title-cjk{
    font-family:'Noto Serif TC',serif; font-weight:700;
    font-size:clamp(36px,5.5vw,56px); letter-spacing:.5rem;
    color:var(--text-primary); margin:0;
  }
  .title-rule{width:70px;height:3px;background:var(--ember);margin:14px auto}
  .couplet{
    font-family:'Noto Serif TC',serif; font-size:clamp(17px,2.2vw,22px);
    color:var(--text-secondary); line-height:1.9; margin:0;
  }
  .counter{margin-top:14px; font-size:clamp(16px,2.0vw,19px); color:var(--text-secondary)}
  .counter b{color:var(--ember); font-size:1.35em; font-weight:700}

  .theme-toggle{
    position:absolute; top:1.6rem; left:1.6rem; z-index:7;
    display:flex; align-items:center; gap:8px;
    background:rgba(0,0,0,0.18); border:1px solid rgba(255,255,255,0.25);
    border-radius:999px; padding:7px 14px; cursor:pointer;
    color:var(--text-primary); font-size:12px; user-select:none;
    backdrop-filter:blur(4px);
  }
  .theme-toggle svg{width:14px;height:14px}

  .cta-light{
    position:absolute; top:1.8rem; right:1.8rem; z-index:7;
    width:92px; height:92px; border-radius:50%;
    background:radial-gradient(circle at 35% 30%, var(--ember) 0%, var(--ember-deep) 100%);
    color:#fff; border:none; cursor:pointer;
    font-family:'Noto Sans TC',sans-serif; font-weight:700; font-size:15px; line-height:1.4;
    box-shadow:0 6px 18px rgba(0,0,0,0.35);
    transition:transform .25s ease;
  }
  .cta-light:hover{transform:scale(1.06)}

  .scene{position:absolute; inset:0; z-index:4}
  .qr-card{
    position:absolute; bottom:1.6rem; right:1.6rem; z-index:10;
    display:flex; flex-direction:column; align-items:center; gap:6px;
    background:rgba(255,255,255,0.12); border:1px solid rgba(255,255,255,0.22);
    border-radius:12px; padding:10px 10px 6px; text-align:center;
    color:var(--text-primary); font-size:11px; font-weight:700;
    backdrop-filter:blur(6px);
  }
  .qr-card img{
    width:90px; height:90px; border-radius:4px;
    background:#fff; padding:4px;
  }
  .qr-card span{
    opacity:0.85; letter-spacing:1px;
  }

  @keyframes riseUp{
    0%{ top:88%; opacity:0; }
    8%{ opacity:1; }
    88%{ opacity:1; }
    100%{ top:-26%; opacity:0; }
  }
  @keyframes swayA{0%,100%{transform:translateX(-16px) rotate(-3deg)}50%{transform:translateX(16px) rotate(3deg)}}
  @keyframes swayB{0%,100%{transform:translateX(14px) rotate(3deg)}50%{transform:translateX(-14px) rotate(-3deg)}}
  /* ---------- 新海誠風格彗星流星效果 ---------- */
  .shooting-star {
    position: absolute;
    height: 4px;
    border-radius: 50%;
    /* 青色到紫色的夢幻色彩漸變 */
    background: linear-gradient(90deg, #00f3ff 0%, #a600ff 50%, rgba(166,0,ff,0) 100%);
    filter: drop-shadow(0 0 12px #00f3ff) drop-shadow(0 0 20px #a600ff);
    animation: shootComet 7.5s cubic-bezier(0.15, 0.85, 0.35, 1) forwards;
    opacity: 0;
    z-index: 2;
    pointer-events: none;
    transform-origin: left center;
  }
  
  /* 彗星頭部發光球體 */
  .shooting-star::before {
    content: "";
    position: absolute;
    left: 0; top: -5px;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: #ffffff;
    box-shadow: 0 0 20px 8px #ffffff, 0 0 35px 12px #00f3ff;
  }

  /* 夢幻粉蠟筆色調的流星碎屑微粒 */
  .comet-spark {
    position: absolute;
    width: 4px;
    height: 4px;
    border-radius: 50%;
    pointer-events: none;
    z-index: 2;
    opacity: 0;
    filter: blur(0.5px);
    animation: sparkDrift 3.5s ease-out forwards;
  }

  @keyframes shootComet {
    0% {
      transform: translate(0, 0) rotate(-28deg) scaleX(0);
      opacity: 0;
    }
    10% {
      transform: translate(100px, 53px) rotate(-28deg) scaleX(1);
      opacity: 1;
    }
    90% {
      opacity: 1;
    }
    100% {
      transform: translate(950px, 505px) rotate(-28deg) scaleX(0.7);
      opacity: 0;
    }
  }

  /* ---------- 燈籠內部火焰呼吸閃爍效果 ---------- */
  @keyframes flameFlicker {
    0%, 100% { opacity: 0.75; transform: scale(1); }
    30% { opacity: 0.95; transform: scale(1.04) translate(-0.3px, -0.3px); }
    70% { opacity: 0.55; transform: scale(0.92) translate(0.3px, 0.3px); }
  }
  .internal-flame {
    animation: flameFlicker 1.4s ease-in-out infinite alternate;
    transform-origin: 80px 155px;
  }

  @keyframes sparkDrift {
    0% {
      transform: translate(0, 0) scale(1);
      opacity: 0.9;
    }
    100% {
      transform: translate(var(--dx), var(--dy)) scale(0.1);
      opacity: 0;
    }
  }
  /* ---------- page 2 : 發願表單 ---------- */
  .form-page{
    position:fixed; inset:0; z-index:20; display:none;
    background:linear-gradient(180deg,#0d1b2e 0%, #050a14 100%);
    color:var(--text-primary,#f4ead9);
    overflow-y:auto;
  }
  .form-wrap{max-width:480px; margin:0 auto; padding:3.2rem 1.6rem 4rem}
  .back-link{font-size:13px; color:#9fb0c6; cursor:pointer; margin-bottom:1.6rem; display:inline-block}
  .form-title{font-family:'Noto Serif TC',serif; font-weight:700; font-size:26px; letter-spacing:4px; color:#f0deb4; text-align:center}
  .form-rule{width:56px;height:3px;background:var(--ember);margin:14px auto}
  .form-sub{font-family:'Noto Serif TC',serif; font-size:14px; color:#b8c4d6; text-align:center; margin-bottom:2.2rem}
  .field-label{font-size:13px; color:#cfd8e3; margin-bottom:8px}
  .field-input{width:100%; height:44px; border-radius:10px; border:none; padding:0 14px; background:#fff; color:#222; font-size:15px; font-family:'Noto Sans TC',sans-serif; margin-bottom:1.4rem}
  .wish-row{display:flex; align-items:center; gap:14px; background:#fff; border-radius:30px; padding:10px 18px; cursor:pointer; margin-bottom:10px}
  .wish-dot{width:20px;height:20px;border-radius:50%;background:#c9ccd1;flex-shrink:0;transition:background .2s}
  .wish-row span.label{font-size:16px; font-weight:700; color:#1c2b3a; min-width:96px}
  .wish-row span.sub{font-size:13px; color:#5b6b86; flex:1; text-align:right; margin-right:6px}
  .wish-icon{width:30px;height:30px;flex-shrink:0}
  .submit-btn{width:100%; height:50px; border-radius:10px; border:none; background:var(--ember); color:#fff; font-size:16px; font-weight:700; margin-top:1.6rem; cursor:pointer; font-family:'Noto Sans TC',sans-serif}
  .submit-btn:hover{background:var(--ember-deep)}

  /* ---------- 點擊天燈綻放佛光與祝福特效 ---------- */
  .lantern-container {
    cursor: pointer;
    transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1), filter 0.4s ease;
    transform-origin: center 154px; /* 對準燈身中心點 */
    position: relative;
    width: 190px;
    height: 380px;
  }
  .lantern-container:hover {
    transform: scale(1.05);
    filter: drop-shadow(0 0 20px var(--lantern-glow-color, rgba(255, 215, 0, 0.85))) 
            drop-shadow(0 0 35px rgba(255, 150, 0, 0.75));
    animation: hoverSway 1.8s ease-in-out infinite;
  }
  @keyframes hoverSway {
    0%, 100% { transform: scale(1.05) rotate(0deg); }
    25% { transform: scale(1.05) rotate(-2.5deg); }
    75% { transform: scale(1.05) rotate(2.5deg); }
  }

  /* 燈芯瞬間變亮 */
  .lantern-container.blooming .internal-flame {
    animation: flameBloom 2.5s cubic-bezier(0.1, 0.8, 0.3, 1) forwards;
    transform-origin: 80px 155px;
  }
  @keyframes flameBloom {
    0% {
      transform: scale(1);
      opacity: 0.9;
      filter: brightness(1.5) drop-shadow(0 0 10px #fff);
    }
    10%, 45% {
      transform: scale(1.7) translate(0px, -2px);
      opacity: 1;
      filter: brightness(2.8) drop-shadow(0 0 18px #ffeb3b) drop-shadow(0 0 28px #ff9800);
    }
    100% {
      transform: scale(1);
      opacity: 0.9;
      filter: none;
    }
  }

  /* 金色佛光向外擴散 */
  .buddha-glow-ring {
    position: absolute;
    top: 154px; /* 燈身中心 Y */
    left: 95px; /* 燈身中心 X */
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,255,255,1) 0%, rgba(255,223,100,0.95) 25%, rgba(255,180,0,0.55) 60%, rgba(255,150,0,0) 100%);
    transform: translate(-50%, -50%) scale(0);
    pointer-events: none;
    opacity: 0;
    z-index: -1;
  }
  .lantern-container.blooming .buddha-glow-ring {
    animation: buddhaBloom 2.5s cubic-bezier(0.1, 0.8, 0.3, 1) forwards;
  }
  @keyframes buddhaBloom {
    0% {
      transform: translate(-50%, -50%) scale(0.1);
      opacity: 0;
    }
    5% {
      opacity: 1;
    }
    20% {
      transform: translate(-50%, -50%) scale(22);
      opacity: 0.9;
      filter: blur(2px);
    }
    80% {
      opacity: 0.35;
    }
    100% {
      transform: translate(-50%, -50%) scale(30);
      opacity: 0;
      filter: blur(6px);
    }
  }

  /* 蓮花曼陀羅浮現並緩慢旋轉 */
  .lotus-mandala {
    position: absolute;
    top: 154px;
    left: 95px;
    width: 250px;
    height: 250px;
    transform: translate(-50%, -50%) scale(0) rotate(0deg);
    transform-origin: center center;
    pointer-events: none;
    opacity: 0;
    z-index: -2;
    filter: drop-shadow(0 0 15px rgba(255, 215, 0, 0.75));
  }
  .lantern-container.blooming .lotus-mandala {
    animation: mandalaRotateBloom 2.5s cubic-bezier(0.15, 0.85, 0.35, 1) forwards;
  }
  @keyframes mandalaRotateBloom {
    0% {
      transform: translate(-50%, -50%) scale(0.2) rotate(0deg);
      opacity: 0;
    }
    15%, 50% {
      transform: translate(-50%, -50%) scale(1.1) rotate(50deg);
      opacity: 0.95;
    }
    100% {
      transform: translate(-50%, -50%) scale(1.25) rotate(90deg);
      opacity: 0;
    }
  }

  /* 祝福詞浮現效果 */
  .blessing-text-container {
    position: absolute;
    top: 154px;
    left: 95px;
    transform: translate(-50%, -50%);
    display: flex;
    flex-direction: row-reverse; /* 古風書寫：從右到左 */
    gap: 16px;
    pointer-events: none;
    opacity: 0;
    z-index: 12;
  }
  .lantern-container.blooming .blessing-text-container {
    animation: blessingFloatUp 2.5s cubic-bezier(0.2, 0.85, 0.4, 1) forwards;
  }
  .blessing-bg-glow {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 140px;
    height: 180px;
    background: radial-gradient(circle, rgba(255, 240, 180, 0.25) 0%, rgba(255, 150, 0, 0.05) 50%, rgba(0,0,0,0) 80%);
    filter: blur(8px);
    pointer-events: none;
    z-index: 11;
    opacity: 0;
  }
  .lantern-container.blooming .blessing-bg-glow {
    animation: blessingBgFade 2.5s ease-in-out forwards;
  }
  @keyframes blessingBgFade {
    0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
    15%, 50% { opacity: 1; transform: translate(-50%, -50%) scale(1.25); }
    100% { opacity: 0; transform: translate(-50%, -50%) scale(1.5); }
  }

  .blessing-column {
    font-family: 'Noto Serif TC', serif;
    font-weight: 700;
    font-size: 22px;
    color: #fffdec;
    text-shadow: 
      0 0 4px #ffd700, 
      0 0 10px #ff9800,
      0 0 20px rgba(255, 150, 0, 0.8);
    writing-mode: vertical-rl;
    text-orientation: upright;
    letter-spacing: 0.35em;
    opacity: 0;
  }
  .lantern-container.blooming .blessing-column {
    animation: blessingTextFade 2.5s ease-in-out forwards;
  }
  /* 第一欄（背景發光除外）與第二欄微粒延遲，產生詩意感 */
  .blessing-column:nth-child(2) {
    animation-delay: 0.15s;
  }
  .blessing-column:nth-child(3) {
    animation-delay: 0.4s;
  }

  @keyframes blessingFloatUp {
    0% {
      transform: translate(-50%, -10px);
      opacity: 0;
    }
    15%, 55% {
      transform: translate(-50%, -70px);
      opacity: 1;
    }
    100% {
      transform: translate(-50%, -120px);
      opacity: 0;
    }
  }

  @keyframes blessingTextFade {
    0% {
      opacity: 0;
      transform: scale(0.85);
    }
    15%, 55% {
      opacity: 1;
      transform: scale(1);
    }
    100% {
      opacity: 0;
      transform: scale(0.9);
    }
  }

  /* 金色粒子向上飄散 */
  .golden-particle {
    position: absolute;
    background: radial-gradient(circle, #ffffff 0%, #ffd700 60%, rgba(212,175,55,0) 100%);
    border-radius: 50%;
    pointer-events: none;
    z-index: 10;
    filter: drop-shadow(0 0 4px #ffd700);
    opacity: 0;
  }
  @keyframes particleFloat {
    0% {
      transform: translate(0, 0) scale(1);
      opacity: 0;
    }
    10% {
      opacity: 1;
    }
    90% {
      opacity: 0.8;
    }
    100% {
      transform: translate(var(--pdx), var(--pdy)) scale(0.2);
      opacity: 0;
    }
  }
</style>
</head>
<body>

<div class="stage" id="stage" data-theme="night">
  <div class="stars" id="stars"></div>
  <div class="clouds" id="clouds"></div>
  <div class="celestial"></div>
  <div class="ground-fade"></div>

  <div class="theme-toggle" id="themeToggle">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.2 4.2l1.4 1.4M18.4 18.4l1.4 1.4M1 12h2M21 12h2M4.2 19.8l1.4-1.4M18.4 5.6l1.4-1.4"/></svg>
    <span id="themeLabel">切換為白天</span>
  </div>

  <button class="cta-light" id="goBtn">我要<br>點燈</button>

  <header class="hud">
    <p class="title-cjk">招生點燈</p>
    <div class="title-rule"></div>
    <p class="couplet">一燈引路，度得一人　願以此心，廣結善緣</p>
    <p class="counter">現在已發願度人：<b id="lampCount">1,286</b> 盞</p>
  </header>

  <div class="scene" id="scene"></div>

  <!-- QR Code 掃碼區域 -->
  <div class="qr-card">
    <img id="qrCodeImg" alt="QR Code">
    <span>掃碼發願點燈</span>
  </div>
</div>

<div class="form-page" id="page2">
  <div class="form-wrap">
    <span class="back-link" id="backLink">← 返回</span>
    <p class="form-title">發願度人</p>
    <div class="form-rule"></div>
    <p class="form-sub">願以一燈，照亮一人</p>

    <div class="field-label">我的姓名（已在精舍學員）</div>
    <input class="field-input" type="text" placeholder="請輸入您的姓名">

    <div class="field-label">想度的朋友姓名（尚未上課）</div>
    <input class="field-input" type="text" placeholder="請輸入朋友姓名">

    <div class="field-label" style="margin-bottom:12px">度人心願</div>
    <div id="wishlist"></div>

    <button class="submit-btn" id="submitBtn">送出願力</button>
  </div>
</div>

<!-- Firebase SDK v9+ Modular (Loaded via CDN ES Modules) -->

  /* ---------- Web Audio API 合成輕柔悠揚的佛鐘聲 ---------- */
  function playBellSound() {
    try {
      var AudioContext = window.AudioContext || window.webkitAudioContext;
      if (!AudioContext) return;
      var ctx = new AudioContext();
      var now = ctx.currentTime;
      
      // 模擬寺廟銅鐘/頌缽的諧音與長餘音
      var fundamental = 160; // 160Hz 溫暖深沉的基音
      var partials = [
        { freq: fundamental, gain: 0.5, decay: 4.5 },       // 基音：渾厚共鳴
        { freq: fundamental * 1.5, gain: 0.35, decay: 3.5 },   // 五度音：清澈和諧
        { freq: fundamental * 2.0, gain: 0.3, decay: 2.5 },    // 八度音
        { freq: fundamental * 2.61, gain: 0.25, decay: 2.0 },   // 不規則金屬諧振音（營造金屬感）
        { freq: fundamental * 3.0, gain: 0.2, decay: 1.5 },    // 十二度音
        { freq: fundamental * 3.82, gain: 0.15, decay: 1.2 },   // 高頻亮音
        { freq: fundamental * 4.4, gain: 0.1, decay: 0.8 }      // 極高頻餘震
      ];
      
      var masterGain = ctx.createGain();
      masterGain.gain.setValueAtTime(0, now);
      masterGain.gain.linearRampToValueAtTime(1.0, now + 0.08); // 快速起音（打擊感）
      masterGain.gain.exponentialRampToValueAtTime(0.001, now + 5.0); // 悠長衰減
      
      partials.forEach(function(p) {
        var osc = ctx.createOscillator();
        var gainNode = ctx.createGain();
        
        osc.type = 'sine';
        osc.frequency.setValueAtTime(p.freq, now);
        
        gainNode.gain.setValueAtTime(0, now);
        gainNode.gain.linearRampToValueAtTime(p.gain, now + 0.08);
        gainNode.gain.exponentialRampToValueAtTime(0.001, now + p.decay);
        
        osc.connect(gainNode);
        gainNode.connect(masterGain);
        
        osc.start(now);
        osc.stop(now + p.decay + 0.5);
      });
      
      // 低通濾波器使音色溫潤，濾除刺耳高音
      var filter = ctx.createBiquadFilter();
      filter.type = 'lowpass';
      filter.frequency.setValueAtTime(1200, now);
      
      masterGain.connect(filter);
      filter.connect(ctx.destination);
      
      // 播完後關閉 Context 釋放記憶體
      setTimeout(function() {
        ctx.close();
      }, 6000);
      
    } catch (e) {
      console.warn("Audio Context error: ", e);
    }
  }

  /* ---------- 生成飄升金色粒子 ---------- */
  function spawnGoldenParticles(container) {
    for (var i = 0; i < 25; i++) {
      var p = document.createElement('div');
      p.className = 'golden-particle';
      
      // 起始點：對準燈籠中心 (X: 95px, Y: 154px) 加入些微隨機偏移
      var startX = 95 + (Math.random() * 24 - 12);
      var startY = 154 + (Math.random() * 24 - 12);
      var size = Math.random() * 5 + 3; // 3px 到 8px
      
      p.style.width = size + 'px';
      p.style.height = size + 'px';
      p.style.left = startX + 'px';
      p.style.top = startY + 'px';
      
      // 隨機向外飄移與大幅度向上飄升
      var pdx = (Math.random() * 110 - 55) + 'px';
      var pdy = (Math.random() * -140 - 70) + 'px';
      p.style.setProperty('--pdx', pdx);
      p.style.setProperty('--pdy', pdy);
      
      var dur = 1.2 + Math.random() * 0.9;
      var delay = Math.random() * 0.45;
      p.style.animation = 'particleFloat ' + dur + 's ease-out ' + delay + 's forwards';
      
      container.appendChild(p);
      
      (function(el){
        setTimeout(function(){ el.remove(); }, (dur + delay) * 1000 + 100);
      })(p);
    }
  }

  /* ---------- 統一生成天燈元件與附加點擊互動事件 ---------- */
  function createLanternElement(entry, swatch, x, duration, swayClass) {
    var wrap = document.createElement('div');
    wrap.style.position = 'absolute';
    wrap.style.left = x + '%';
    wrap.style.top = '88%';
    wrap.style.zIndex = '5';
    wrap.style.animation = 'riseUp '+duration+'s linear forwards, '+swayClass+' '+(3+(Math.random()*3)*0.5)+'s ease-in-out infinite';
    
    // 建立互動容器
    var container = document.createElement('div');
    container.className = 'lantern-container';
    container.style.setProperty('--lantern-glow-color', swatch.fill);
    
    // 置入天燈主 SVG
    var svg = lanternSVG(swatch, entry);
    container.appendChild(svg);
    
    // 置入金色佛光擴散環
    var glowRing = document.createElement('div');
    glowRing.className = 'buddha-glow-ring';
    container.appendChild(glowRing);
    
    // 置入蓮花曼陀羅 SVG
    var mandala = createMandalaSVG();
    container.appendChild(mandala);
    
    // 根據 entry.w 心願取得對應的祝福詞
    var blessingText = "";
    wishes.forEach(function(w) {
      if (w.label === entry.w) {
        blessingText = w.sub;
      }
    });
    if (!blessingText) {
      blessingText = "身心安康 福壽增長"; // 預設防呆
    }
    
    // 建立祝福卷軸容器
    var blessingContainer = document.createElement('div');
    blessingContainer.className = 'blessing-text-container';
    
    // 祝福背景金色柔光
    var blessingBg = document.createElement('div');
    blessingBg.className = 'blessing-bg-glow';
    blessingContainer.appendChild(blessingBg);
    
    // 切分祝福語為直書欄位 (以空格切分兩句)
    var parts = blessingText.split(' ');
    parts.forEach(function(part) {
      var col = document.createElement('div');
      col.className = 'blessing-column';
      col.textContent = part;
      blessingContainer.appendChild(col);
    });
    
    container.appendChild(blessingContainer);
    
    // 點擊事件
    container.onclick = function(e) {
      if (container.classList.contains('blooming')) return;
      
      container.classList.add('blooming');
      playBellSound();
      spawnGoldenParticles(container);
      
      // 點擊瞬間暫停天燈上升與擺動，使其在空中綻放效果
      wrap.style.animationPlayState = 'paused';
      
      // 2.5 秒後收回特效並恢復飄移
      setTimeout(function() {
        container.classList.remove('blooming');
        wrap.style.animationPlayState = 'running';
      }, 2500);
    };
    
    wrap.appendChild(container);
    scene.appendChild(wrap);

    setTimeout(function(){ wrap.remove(); }, duration*1000 + 150);
  }

  /* ---------- QR Code 網址生成 ---------- */
  var qrCodeImg = document.getElementById('qrCodeImg');
  if (qrCodeImg) {
    // 獲取目前網址，並加上 #form 錨點，讓使用者掃碼後直接開啟發願頁面
    var formUrl = window.location.protocol + '//' + window.location.host + window.location.pathname + '#form';
    qrCodeImg.src = "https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=" + encodeURIComponent(formUrl);
  }

  /* ---------- 天燈生成 ---------- */
  var scene = document.getElementById('scene');
  var xSlots = [8, 20, 33, 46, 59, 72, 85, 14, 39, 65, 92, 27];

  var defaultEntries = [
    {a:"陳同學", b:"林小姐", w:"身體健康"},
    {a:"王學員", b:"李先生", w:"家庭和樂"},
    {a:"張同學", b:"黃小姐", w:"道業成就"},
    {a:"吳學員", b:"周先生", w:"學業進步"},
    {a:"蔡同學", b:"許小姐", w:"事業順利"},
    {a:"林學員", b:"楊先生", w:"廣結善緣"}
  ];
  var firebaseEntries = [];

  var spawnIdx = 0, entryIdx = 0;
  var baseCount = 1286;
  var dbCount = 0;
  var sessionSpawns = 0;
  var countEl = document.getElementById('lampCount');

  function updateCounterDisplay() {
    var totalDisplayCount = baseCount + dbCount + sessionSpawns;
    countEl.textContent = totalDisplayCount.toLocaleString();
  }

  // 如果 Firebase 已連線，開始監聽資料庫
  if (isFirebaseActive && db && wishesRef) {
    var recentWishesQuery = query(wishesRef, orderByChild('timestamp'), limitToLast(100));
    onValue(recentWishesQuery, function(snapshot) {
      var data = snapshot.val();
      if (data) {
        var temp = [];
        Object.keys(data).forEach(function(key) {
          temp.push(data[key]);
        });
        // 依發願時間排序（舊到新輪流播放）
        temp.sort(function(a, b) { return (a.timestamp || 0) - (b.timestamp || 0); });
        firebaseEntries = temp;
      }
    });

    // 監聽發願總筆數更新計數器
    onValue(wishesRef, function(snapshot) {
      var totalWishes = snapshot.numChildren();
      dbCount = totalWishes;
      updateCounterDisplay();
    });
  }

  function spawnLantern(){
    var entry;
    if (isFirebaseActive && firebaseEntries.length > 0) {
      entry = firebaseEntries[entryIdx % firebaseEntries.length];
    } else {
      entry = defaultEntries[entryIdx % defaultEntries.length];
    }
    var swatch = lanternPalette[entryIdx % lanternPalette.length];
    var x = xSlots[spawnIdx % xSlots.length];
    var duration = 10 + (spawnIdx % 6) * 1.4;
    var swayClass = (spawnIdx % 2 === 0) ? 'swayA' : 'swayB';
    
    createLanternElement(entry, swatch, x, duration, swayClass);

    // 每次生成天燈時皆遞增本機生成的數量
    sessionSpawns += 1;
    updateCounterDisplay();

    spawnIdx++;
    entryIdx++;
  }
  for (var i=0;i<5;i++){ (function(i){ setTimeout(spawnLantern, i*1300); })(i); }
  setInterval(spawnLantern, 2000);

  /* ---------- 度人心願選項（如圖樣式） ---------- */
  function lanternIconSVG(color){
    var svg = el('svg', {viewBox:"0 0 40 40", class:"wish-icon"});
    var grad = el('radialGradient', {id:"g"+color.replace('#','')}, el('defs', {}, svg));
    el('stop', {offset:"0%", "stop-color":"#fff6e0"}, grad);
    el('stop', {offset:"45%", "stop-color":color}, grad);
    el('stop', {offset:"100%", "stop-color":color, "stop-opacity":"0.55"}, grad);
    el('circle', {cx:"20", cy:"20", r:"18", fill:"url(#g"+color.replace('#','')+")"}, svg);
    el('circle', {cx:"20", cy:"20", r:"18", fill:"none", stroke:"rgba(255,255,255,0.5)", "stroke-width":"1"}, svg);
    return svg;
  }
  var wishes = [
    {label:"身體健康", sub:"身心安康 福壽增長", color:"#e8a23c"},
    {label:"家庭和樂", sub:"和諧美滿 子孫賢孝", color:"#e0593a"},
    {label:"道業成就", sub:"福慧雙修 圓成佛道", color:"#c0392b"},
    {label:"學業進步", sub:"金榜題名 智慧無礙", color:"#3f9d5e"},
    {label:"事業順利", sub:"事事圓滿 所求皆應", color:"#3a7fc1"},
    {label:"廣結善緣", sub:"人緣和合 廣修善法", color:"#9b6fc4"}
  ];
  var wl = document.getElementById('wishlist');
  wishes.forEach(function(w){
    var row = document.createElement('div');
    row.className = 'wish-row';
    var dot = document.createElement('span');
    dot.className = 'wish-dot';
    var label = document.createElement('span');
    label.className = 'label';
    label.textContent = w.label;
    var sub = document.createElement('span');
    sub.className = 'sub';
    sub.textContent = w.sub;
    row.appendChild(dot);
    row.appendChild(label);
    row.appendChild(sub);
    row.appendChild(lanternIconSVG(w.color));
    row.onclick = function(){
      Array.prototype.forEach.call(wl.children, function(r){ r.firstChild.style.background = '#c9ccd1'; });
      dot.style.background = '#c0392b';
    };
    wl.appendChild(row);
  });

  /* ---------- 頁面切換 ---------- */
  var page2 = document.getElementById('page2');

  function checkHashPage() {
    if (window.location.hash === '#form') {
      page2.style.display = 'block';
    } else {
      page2.style.display = 'none';
    }
  }

  window.addEventListener('hashchange', checkHashPage);
  checkHashPage();

  document.getElementById('goBtn').onclick = function(){ 
    window.location.hash = 'form'; 
  };
  document.getElementById('backLink').onclick = function(){ 
    window.location.hash = ''; 
  };

  document.getElementById('submitBtn').onclick = function(){
    var myName = document.querySelector('input[placeholder="請輸入您的姓名"]').value.trim();
    var friendName = document.querySelector('input[placeholder="請輸入朋友姓名"]').value.trim();
    
    // 獲取選擇的心願
    var selectedWish = null;
    Array.prototype.forEach.call(wl.children, function(r){
      if (r.firstChild.style.background === 'rgb(192, 57, 43)' || r.firstChild.style.background === '#c0392b') {
        selectedWish = r.querySelector('.label').textContent;
      }
    });

    if (!myName || !friendName) {
      alert('請填寫您與朋友的姓名！');
      return;
    }
    if (!selectedWish) {
      alert('請選擇一個度人心願！');
      return;
    }

    if (isFirebaseActive && db && wishesRef) {
      var btn = document.getElementById('submitBtn');
      btn.disabled = true;
      btn.textContent = '傳送願力中...';

      push(wishesRef, {
        a: myName,
        b: friendName,
        w: selectedWish,
        timestamp: serverTimestamp()
      }).then(function() {
        alert('您的願力心燈已成功飄升！');
        window.location.hash = '';
        // 清空輸入
        document.querySelector('input[placeholder="請輸入您的姓名"]').value = '';
        document.querySelector('input[placeholder="請輸入朋友姓名"]').value = '';
        Array.prototype.forEach.call(wl.children, function(r){ r.firstChild.style.background = '#c9ccd1'; });
        btn.disabled = false;
        btn.textContent = '送出願力';
      }).catch(function(error) {
        console.error("Firebase error: ", error);
        alert('送出失敗，請檢查網路連線或 Firebase 配置！');
        btn.disabled = false;
        btn.textContent = '送出願力';
      });
    } else {
      // 預覽模式
      alert('【預覽模式】感謝您的發願！姓名：' + myName + '，度朋友：' + friendName + '，心願：' + selectedWish);
      
      // 本地飛出天燈效果
      var mockEntry = {a: myName, b: friendName, w: selectedWish};
      var swatch = lanternPalette[Math.floor(Math.random() * lanternPalette.length)];
      var x = 40 + Math.random() * 20;
      createLanternElement(mockEntry, swatch, x, 14, 'swayA');
      
      dbCount += 1;
      updateCounterDisplay();

      window.location.hash = '';
      document.querySelector('input[placeholder="請輸入您的姓名"]').value = '';
      document.querySelector('input[placeholder="請輸入朋友姓名"]').value = '';
      Array.prototype.forEach.call(wl.children, function(r){ r.firstChild.style.background = '#c9ccd1'; });
    }
  };

  /* ---------- 新海誠風格巨大彗星生成器 ---------- */
  function spawnShootingStar() {
    if (stage.getAttribute('data-theme') !== 'night') return;
    
    var star = document.createElement('div');
    star.className = 'shooting-star';
    
    // 從左上角高處滑落至右下角城市天際線
    var startX = 5 + Math.random() * 20; // 5% - 25%
    var startY = -5; // 從螢幕外上方墜落
    var length = 340 + Math.random() * 120; // 巨大的彗星拖尾長度 340px - 460px
    
    star.style.left = startX + '%';
    star.style.top = startY + '%';
    star.style.width = length + 'px';
    
    stage.appendChild(star);

    // 彗星墜落期間，定時在彗星頭部位置釋放色彩夢幻的發光微粒 (Sparks)
    var sparkInterval = setInterval(function() {
      if (!star.parentNode) {
        clearInterval(sparkInterval);
        return;
      }
      
      // 計算目前彗星頭部的估計座標以釋放碎屑
      var rect = star.getBoundingClientRect();
      if (rect.width > 0) {
        // 隨機釋放 3-5 顆夢幻粉蠟筆色調微粒 (青、紫、粉紅、粉黃)
        var colors = ['#5bf2ff', '#d16eff', '#ff9ee0', '#ffeb99', '#ffffff'];
        for (var i = 0; i < 4; i++) {
          var spark = document.createElement('div');
          spark.className = 'comet-spark';
          spark.style.left = (rect.left + window.scrollX) + 'px';
          spark.style.top = (rect.top + window.scrollY) + 'px';
          spark.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
          spark.style.boxShadow = '0 0 8px ' + spark.style.backgroundColor;
          
          // 向後噴散擴散的偏移方向
          var dx = (Math.random() * -120 - 40) + 'px';
          var dy = (Math.random() * 80 - 40) + 'px';
          spark.style.setProperty('--dx', dx);
          spark.style.setProperty('--dy', dy);
          
          stage.appendChild(spark);
          
          // 閉包防止記憶體洩漏並移除微粒
          (function(s) {
            setTimeout(function() { s.remove(); }, 3500);
          })(spark);
        }
      }
    }, 180);
    
    setTimeout(function() {
      clearInterval(sparkInterval);
      star.remove();
    }, 7600);
  }

  // 15 - 20 分鐘出現一次流星
  // 15分鐘 = 900,000毫秒，20分鐘 = 1,200,000毫秒
  function queueNextComet() {
    var minMs = 15 * 60 * 1000;
    var maxMs = 20 * 60 * 1000;
    var delay = minMs + Math.random() * (maxMs - minMs);
    
    setTimeout(function() {
      spawnShootingStar();
      queueNextComet(); // 遞迴調用排程下一次流星
    }, delay);
  }

  // 為了方便現場人員預覽與展示效果，剛載入網頁 5 秒後先展示一次，之後便進入 15-20 分鐘的正式循環
  setTimeout(function() {
    spawnShootingStar();
  }, 5000);

  queueNextComet();

</script>
</body>
</html>
